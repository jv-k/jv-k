name: Build Icons & README

on:
  push:
    paths:
      - "src/data/mystack.yml"
      - "src/templates/**"
      - "scripts/**"
      - "package.json"
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Fetch Icons & Build README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install yamllint
        run: pip install yamllint

      - name: Test YAML data
        run: bun run test:yaml

      - name: Fetch icons with version fallback
        run: bun run fetch-icons

      - name: Build readme.md
        run: |
          bun run build
          cat ./build/readme.md

      - name: Copy README to repo root
        run: cp ./build/readme.md ./readme.md

      - name: Configure git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --local user.email "$(git log --format='%ae' HEAD^!)"
          git config --local user.name "$(git log --format='%an' HEAD^!)"

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          default_author: user_info
          message: "build: update icons and readme"
          add: |
            ./readme.md
            ./assets/icons/
          push: origin main

      - name: Display Results
        run: git show --summary
